# Production service configs — mount from docker-compose.prod.example.yml
# Set external_url to your public HTTPS hostnames.

[server]
host = "0.0.0.0"
port = 8081
external_url = "https://visas.example.org"
environment = "prod"

[database]
driver = "postgres"
url_env = "REGISTRY_DATABASE_URL"
auto_migrate = true

[signing]
private_key_pem = "/secrets/registry_rs256.pem"
visa_lifetime_seconds = 86400

[auth]
bootstrap_api_key_env = "REGISTRY_BOOTSTRAP_API_KEY"
