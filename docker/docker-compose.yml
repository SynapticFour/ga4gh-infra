# Full stack with PostgreSQL for visa-registry and service-registry.
# Per-service images are built from docker/Dockerfile.* (see docker/README.md).
#
# Usage (from repo root):
#   docker compose -f docker/docker-compose.yml --env-file docker/.env up --build --wait
#
# Mix component versions via docker/.env (AAI_BROKER_VERSION, etc.).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ga4gh
      POSTGRES_PASSWORD: ga4gh
      POSTGRES_DB: postgres
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ga4gh -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-idp:
    image: ${GA4GH_IMAGE_PREFIX}/mock-idp:${MOCK_IDP_VERSION}
    build:
      context: ..
      dockerfile: docker/Dockerfile.mock-idp
    environment:
      MOCK_IDP_ISSUER: http://mock-idp:9000
      MOCK_IDP_SIGNING_KEY_PEM: /secrets/mock_idp_rs256.pem
      MOCK_IDP_SUBJECT: researcher@uni-heidelberg.de
      MOCK_IDP_CLIENT_ID: ga4gh-broker
      MOCK_IDP_CLIENT_SECRET: mock-client-secret
      RUST_LOG: info
    ports:
      - "9000:9000"
    volumes:
      - ./secrets:/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/.well-known/openid-configuration"]
      interval: 5s
      timeout: 5s
      retries: 10

  visa-registry:
    image: ${GA4GH_IMAGE_PREFIX}/visa-registry:${VISA_REGISTRY_VERSION}
    build:
      context: ..
      dockerfile: docker/Dockerfile.visa-registry
    command: ["/config/visa-registry.toml"]
    environment:
      REGISTRY_DATABASE_URL: postgres://ga4gh:ga4gh@postgres:5432/visa_registry
      REGISTRY_BOOTSTRAP_API_KEY: dev-visa-api-key
      RUST_LOG: info
    ports:
      - "8081:8081"
    volumes:
      - ./config/visa-registry.toml:/config/visa-registry.toml:ro
      - ./secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/service-info"]
      interval: 5s
      timeout: 5s
      retries: 10

  duo-service:
    image: ${GA4GH_IMAGE_PREFIX}/duo-service:${DUO_SERVICE_VERSION}
    build:
      context: ..
      dockerfile: docker/Dockerfile.duo-service
    command: ["/config/duo-service.toml"]
    environment:
      RUST_LOG: info
    ports:
      - "8082:8082"
    volumes:
      - ./config/duo-service.toml:/config/duo-service.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/service-info"]
      interval: 5s
      timeout: 5s
      retries: 10

  service-registry:
    image: ${GA4GH_IMAGE_PREFIX}/service-registry:${SERVICE_REGISTRY_VERSION}
    build:
      context: ..
      dockerfile: docker/Dockerfile.service-registry
    command: ["/config/service-registry.toml"]
    environment:
      SERVICE_REGISTRY_DATABASE_URL: postgres://ga4gh:ga4gh@postgres:5432/service_registry
      SERVICE_REGISTRY_REGISTRATION_KEY: dev-service-registry-key
      RUST_LOG: info
    ports:
      - "8083:8083"
    volumes:
      - ./config/service-registry.toml:/config/service-registry.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/service-info"]
      interval: 5s
      timeout: 5s
      retries: 10

  access-decision-service:
    image: ${GA4GH_IMAGE_PREFIX}/access-decision-service:${ACCESS_DECISION_SERVICE_VERSION}
    build:
      context: ..
      dockerfile: docker/Dockerfile.access-decision-service
    command: ["/config/access-decision-service.toml"]
    environment:
      ADS_DATABASE_URL: postgres://ga4gh:ga4gh@postgres:5432/ads_registry
      ADS_DAC_API_KEY: dev-ads-api-key
      REGISTRY_BOOTSTRAP_API_KEY: dev-visa-api-key
      RUST_LOG: info
    ports:
      - "8090:8090"
    volumes:
      - ./config/access-decision-service.toml:/config/access-decision-service.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
      visa-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/service-info"]
      interval: 5s
      timeout: 5s
      retries: 10

  aai-broker:
    image: ${GA4GH_IMAGE_PREFIX}/aai-broker:${AAI_BROKER_VERSION}
    build:
      context: ..
      dockerfile: docker/Dockerfile.broker
    command: ["/config/broker.toml"]
    environment:
      BROKER_COOKIE_SECRET: dev-broker-cookie-secret
      MOCK_IDP_CLIENT_SECRET: mock-client-secret
      ADS_DAC_API_KEY: dev-ads-api-key
      RUST_LOG: info
    ports:
      - "8080:8080"
    volumes:
      - ./config/broker.toml:/config/broker.toml:ro
      - ./secrets:/secrets:ro
    depends_on:
      mock-idp:
        condition: service_healthy
      visa-registry:
        condition: service_healthy
      access-decision-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/service-info"]
      interval: 5s
      timeout: 5s
      retries: 10

  sample-resource:
    image: ${GA4GH_IMAGE_PREFIX}/sample-resource:${SAMPLE_RESOURCE_VERSION}
    build:
      context: ..
      dockerfile: docker/Dockerfile.sample-resource
    command: ["/config/sample-resource.toml"]
    environment:
      ADS_DAC_API_KEY: dev-ads-api-key
      RUST_LOG: info
    ports:
      - "8084:8084"
    volumes:
      - ./config/sample-resource.toml:/config/sample-resource.toml:ro
    depends_on:
      aai-broker:
        condition: service_healthy
      access-decision-service:
        condition: service_healthy
      visa-registry:
        condition: service_healthy
      duo-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/service-info"]
      interval: 5s
      timeout: 5s
      retries: 10

  register-services:
    image: ${GA4GH_IMAGE_PREFIX}/register-tools:${SERVICE_REGISTRY_VERSION}
    build:
      context: ..
      dockerfile: docker/Dockerfile.register
    entrypoint: ["/bin/sh", "/scripts/register-service.sh"]
    environment:
      SERVICE_REGISTRY_URL: http://service-registry:8083
      SERVICE_REGISTRY_REGISTRATION_KEY: dev-service-registry-key
    volumes:
      - ./scripts/register-service.sh:/scripts/register-service.sh:ro
    depends_on:
      service-registry:
        condition: service_healthy
      aai-broker:
        condition: service_healthy
      visa-registry:
        condition: service_healthy
      duo-service:
        condition: service_healthy
    profiles:
      - register
