<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} · GA4GH Admin</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <h1>GA4GH Admin</h1>
      <ul>
        <li><a href="/" class="{% if active == "dashboard" %}active{% endif %}">Dashboard</a></li>
        <li><a href="/dac" class="{% if active == "dac" %}active{% endif %}">DAC Queue</a></li>
        <li><a href="/datasets" class="{% if active == "datasets" %}active{% endif %}">Datasets</a></li>
        <li><a href="/projects" class="{% if active == "projects" %}active{% endif %}">Projects</a></li>
        <li><a href="/grants" class="{% if active == "grants" %}active{% endif %}">Grants</a></li>
        <li><a href="/audit" class="{% if active == "audit" %}active{% endif %}">Audit Log</a></li>
        <li><a href="/services" class="{% if active == "services" %}active{% endif %}">Service Registry</a></li>
      </ul>
      {% if is_admin %}
      <p class="nav-section">Admin</p>
      <ul>
        <li><a href="/researchers" class="{% if active_admin == "researchers" %}active{% endif %}">Researchers</a></li>
        <li><a href="/agreements" class="{% if active_admin == "agreements" %}active{% endif %}">Agreements</a></li>
        <li><a href="/system" class="{% if active_admin == "system" %}active{% endif %}">System</a></li>
      </ul>
      {% endif %}
      <div class="user-bar">
        <div>{{ user_name }}</div>
        <div>{{ role }}</div>
        <form action="/logout" method="post" style="margin-top:0.5rem">
          <button type="submit" class="btn">Sign out</button>
        </form>
      </div>
    </nav>
    <main class="content">
      <h2>{{ title }}</h2>
      {{ content|safe }}
    </main>
  </div>
  <script src="/static/htmx.min.js"></script>
</body>
</html>
