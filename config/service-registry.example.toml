# Example configuration for the GA4GH Service Registry.
# Copy to config/service-registry.toml and adjust for your deployment.

[server]
host = "0.0.0.0"
port = 8083
external_url = "https://registry.example.org"
environment = "dev"
# When true, registration endpoints reject all write requests (public production mode).
read_only = false

[database]
url_env = "SERVICE_REGISTRY_DATABASE_URL"

[auth]
registration_api_key_env = "SERVICE_REGISTRY_REGISTRATION_KEY"
